<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Search · Mobile</title>
<meta name="viewport" content="width=390" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../sparq-tokens.css" />
<style>
  body { background: var(--cream); font-size: 14px; }
  .page { width: 390px; margin: 0 auto; padding-bottom: 100px; }

  .status { display: flex; justify-content: space-between; padding: 16px 24px 4px; font-size: 14px; font-weight: 600; }

  .top {
    padding: 8px 20px 12px;
    border-bottom: 1px solid var(--line);
    background: var(--cream);
    position: sticky; top: 0; z-index: 10;
  }
  .top-row { display: flex; align-items: center; gap: 10px; }
  .back {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--line); background: var(--surface);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .top-search {
    flex: 1; display: flex; align-items: center;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 12px; padding: 0 14px; height: 40px;
    gap: 10px;
  }
  .top-search svg { color: var(--ink-muted); flex-shrink: 0; }
  .top-search input { flex: 1; border: none; background: transparent; font-size: 13px; min-width: 0; }

  .top-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 12px;
  }
  .top-meta-left { font-size: 12.5px; color: var(--ink-soft); }
  .top-meta-left strong { color: var(--ink); font-weight: 600; }
  .toggle {
    display: flex; background: var(--surface); border: 1px solid var(--line);
    border-radius: 999px; padding: 2px;
  }
  .toggle button {
    padding: 5px 12px; border-radius: 999px; border: none; background: transparent;
    font-size: 11.5px; font-weight: 600; color: var(--ink-mid);
    display: flex; align-items: center; gap: 4px;
  }
  .toggle button.active { background: var(--ink); color: #fff; }

  .filters {
    display: flex; gap: 6px; overflow-x: auto;
    padding: 10px 20px;
    border-bottom: 1px solid var(--line);
  }
  .filters::-webkit-scrollbar { display: none; }
  .fchip {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; background: var(--surface);
    border: 1px solid var(--line); border-radius: 999px;
    font-size: 12px; font-weight: 500; color: var(--ink);
    white-space: nowrap;
  }
  .fchip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Results list */
  .results { padding: 16px 20px 40px; display: flex; flex-direction: column; gap: 18px; }
  .rcard {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .rcard-photo {
    aspect-ratio: 16 / 10; width: 100%; position: relative;
  }
  .rcard-photo .bookmark {
    position: absolute; right: 10px; top: 10px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.95);
    display: flex; align-items: center; justify-content: center; border: none;
  }
  .rcard-photo .chip {
    position: absolute; left: 10px; top: 10px;
    padding: 5px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.95); backdrop-filter: blur(6px);
    font-size: 11px; font-weight: 600; color: var(--ink);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .rcard-photo .chip::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--coral); }
  .rcard-body { padding: 14px 16px; }
  .rcard-head {
    display: flex; justify-content: space-between; align-items: start;
    margin-bottom: 4px;
  }
  .rcard-name { font-family: var(--serif); font-size: 17px; font-weight: 500; color: var(--ink); }
  .rcard-rating { font-size: 12.5px; color: var(--ink); display: inline-flex; align-items: center; gap: 3px; font-weight: 500; }
  .rcard-meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
  .rcard-tags { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .rcard-tag { font-size: 10.5px; padding: 3px 8px; background: var(--warm-2); border-radius: 999px; color: var(--ink-mid); font-weight: 500; }
  .rcard-foot {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--line-soft); padding-top: 10px;
  }
  .rcard-price { font-size: 14px; font-weight: 600; color: var(--ink); }
  .rcard-price span { color: var(--ink-muted); font-weight: 400; font-size: 12px; }
  .rcard-btn {
    padding: 8px 14px; border-radius: 999px;
    background: var(--ink); color: #fff; border: none;
    font-size: 12px; font-weight: 600;
  }

  /* Floating map toggle */
  .map-fab {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 100px; z-index: 20;
    padding: 11px 18px; border-radius: 999px;
    background: var(--ink); color: #fff; border: none;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
  }
  .map-fab svg { color: currentColor; }

  .m-tabs {
    position: fixed; left: 50%; bottom: 0; transform: translateX(-50%);
    width: 390px;
    display: flex; justify-content: space-around;
    padding: 10px 0 26px;
    background: rgba(253, 251, 247, 0.95);
    border-top: 1px solid var(--line);
    backdrop-filter: blur(12px);
    z-index: 5;
  }
  .m-tab { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; font-weight: 500; color: var(--ink-muted); background: none; border: none; }
  .m-tab.active { color: var(--coral); }
</style>
</head>
<body>
<div class="page">

  <div class="status">
    <span>9:41</span>
    <div>
      <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect y="6" width="3" height="4" rx="0.5"/><rect x="4" y="4" width="3" height="6" rx="0.5"/><rect x="8" y="2" width="3" height="8" rx="0.5"/><rect x="12" width="3" height="10" rx="0.5"/></svg>
    </div>
  </div>

  <div class="top">
    <div class="top-row">
      <button class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5m7-7-7 7 7 7"/></svg></button>
      <div class="top-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input value="Gel manicure · Brooklyn" />
      </div>
      <button class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg></button>
    </div>
    <div class="top-meta">
      <div class="top-meta-left"><strong>184 artists</strong> · from $45</div>
      <div class="toggle">
        <button class="active">List</button>
        <button>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
          Map
        </button>
      </div>
    </div>
  </div>

  <div class="filters">
    <button class="fchip active">This week ✕</button>
    <button class="fchip">$ – $$</button>
    <button class="fchip">4.8+ ★</button>
    <button class="fchip">Extensions</button>
    <button class="fchip">Instant book</button>
  </div>

  <div class="results">

    <article class="rcard">
      <div class="rcard-photo sparq-img" data-tone="2">
        <span class="chip">Instant book</span>
        <button class="bookmark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16l7-4 7 4z"/></svg></button>
      </div>
      <div class="rcard-body">
        <div class="rcard-head">
          <span class="rcard-name">Maya Rivera</span>
          <span class="rcard-rating"><span class="sparq-star sparq-star--coral sparq-star--sm"></span> 4.96 (218)</span>
        </div>
        <div class="rcard-meta">Williamsburg · 1.2 mi away</div>
        <div class="rcard-tags">
          <span class="rcard-tag">Gel</span>
          <span class="rcard-tag">Extensions</span>
          <span class="rcard-tag">Chrome</span>
        </div>
        <div class="rcard-foot">
          <span class="rcard-price">$65 <span>· 1hr · Sat 10am</span></span>
          <button class="rcard-btn">View →</button>
        </div>
      </div>
    </article>

    <article class="rcard">
      <div class="rcard-photo sparq-img" data-tone="9">
        <button class="bookmark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16l7-4 7 4z"/></svg></button>
      </div>
      <div class="rcard-body">
        <div class="rcard-head">
          <span class="rcard-name">Sana Ito</span>
          <span class="rcard-rating"><span class="sparq-star sparq-star--coral sparq-star--sm"></span> 4.98 (142)</span>
        </div>
        <div class="rcard-meta">DUMBO · 0.8 mi</div>
        <div class="rcard-tags">
          <span class="rcard-tag">Japanese gel</span>
          <span class="rcard-tag">Nail art</span>
        </div>
        <div class="rcard-foot">
          <span class="rcard-price">$85 <span>· 1.5hr · Opens in 2h</span></span>
          <button class="rcard-btn">View →</button>
        </div>
      </div>
    </article>

    <article class="rcard">
      <div class="rcard-photo sparq-img" data-tone="4">
        <button class="bookmark"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v16l7-4 7 4z"/></svg></button>
      </div>
      <div class="rcard-body">
        <div class="rcard-head">
          <span class="rcard-name">Priya Shah</span>
          <span class="rcard-rating"><span class="sparq-star sparq-star--coral sparq-star--sm"></span> 4.98 (451)</span>
        </div>
        <div class="rcard-meta">Park Slope · 2.3 mi</div>
        <div class="rcard-tags">
          <span class="rcard-tag">Gel</span>
          <span class="rcard-tag">Pedi combo</span>
        </div>
        <div class="rcard-foot">
          <span class="rcard-price">$70 <span>· 1hr · Mon 9am</span></span>
          <button class="rcard-btn">View →</button>
        </div>
      </div>
    </article>

  </div>

  <button class="map-fab">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z"/><circle cx="12" cy="9" r="2"/></svg>
    See on map
  </button>

  <nav class="m-tabs">
    <button class="m-tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8"/></svg>
      Discover
    </button>
    <button class="m-tab active">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      Search
    </button>
    <button class="m-tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
      Bookings
    </button>
    <button class="m-tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Messages
    </button>
    <button class="m-tab">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      Me
    </button>
  </nav>

</div>
</body>
</html>
